<!DOCTYPE html>
<html>
<head>
    <title>Emotion Voice Generator</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f7f7f7;
        }

        ul {
            padding-left: 20px;
        }

        audio {
            margin-top: 10px;
            width: 100%;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎙 Emotion TTS</h1>

    <form action="/analyze" method="post">
        <textarea name="text" placeholder="Type your text here...">{{text if text else ""}}</textarea>
        <button type="submit">Generate Voice</button>
    </form>

    {% if emotion %}
    <div class="result">
        <p><b>Emotion:</b> {{emotion}}</p>
        <p><b>Intensity:</b> {{intensity}}</p>

        <p><b>Voice Params:</b></p>
        <ul>
            <li>Rate: {{params.rate}}</li>
            <li>Volume: {{params.volume}}</li>
            <li>Pitch: {{params.pitch}}</li>
        </ul>

        <audio controls>
            <source src="/audio" type="audio/mpeg">
        </audio>
    </div>
    {% endif %}
</div>

</body>
</html>
